# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        env:
          PAGES_BASE: /${{ github.event.repository.name }}
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            ./ dist/
          touch dist/.nojekyll
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = path.join(process.cwd(), 'dist');
          const base = process.env.PAGES_BASE || '';
          const exts = new Set(['.html', '.js', '.css', '.json', '.webmanifest']);
          const localPrefixes = ['zh-cn', 'en', '_astro', 'images', 'scripts', 'api', 'fonts'];
          const localFiles = [
            'favicon.ico',
            'favicon-16x16.png',
            'favicon-32x32.png',
            'favicon-96x96.png',
            'android-icon-192x192.png',
            'ms-icon-144x144.png',
            'manifest.json',
            'sw.js',
            'theme-init.js',
            'DocumentLayout.C1MMuyFv.css',
            'page.BbHDQgCD.js',
          ];

          function walk(dir, files = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const file = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(file, files);
              } else if (exts.has(path.extname(entry.name))) {
                files.push(file);
              }
            }
            return files;
          }

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }

          function prefixRootLocalPaths(input) {
            let output = input;
            for (const prefix of localPrefixes) {
              output = output.replace(
                new RegExp(`(?<![A-Za-z0-9])/(?=${prefix}(?:/|[?#'"\\\\)]|$))`, 'g'),
                `${base}/`,
              );
            }
            for (const file of localFiles) {
              output = output.replace(
                new RegExp(`(?<![A-Za-z0-9])/${escapeRegExp(file)}(?=([?#'"\\\\)]|$))`, 'g'),
                `${base}/${file}`,
              );
            }
            return output.replaceAll(`${base}${base}/`, `${base}/`);
          }

          for (const file of walk(root)) {
            const before = fs.readFileSync(file, 'utf8');
            const after = prefixRootLocalPaths(before);
            if (after !== before) {
              fs.writeFileSync(file, after);
            }
          }

          const routePatchReplacement = [
            'const P0=', JSON.stringify(base),
            ';function B0(e){return P0&&(e===P0||e.startsWith(P0+"/"))?e.slice(P0.length)||"/":e}',
            'function M0(e){return P0&&e.startsWith("/")&&e!==P0&&!e.startsWith(P0+"/")?P0+e:e}',
            'function k0(e){const[t]=e.split("?"),n=B0(t).split("/").filter(Boolean);if(n.length>0&&Qf.includes(n[0])){const o=n.slice(1).join("/");return o?`/${o}`:"/"}return B0(t)||"/"}',
            'function C0(e){return/^[a-zA-Z][a-zA-Z\\d+\\-.]*:/.test(e)}',
            'function j0(){return typeof navigator>"u"?!1:navigator.connection?.saveData===!0}',
            'function yn(e,t){if(!t||C0(t)||t.startsWith("#"))return t;if(t.startsWith("?"))return M0(`/${e}/${t}`.replace("/?","?"));if(!t.startsWith("/"))return t;t=B0(t);const n=`/${e}`,o=t===n||t.startsWith(`${n}/`)?t:t==="/"?n:`${n}${t}`;return M0(o)}',
            'function I0(e){if(typeof e=="string")return e;const t=k0(e.href);return yn(e.locale,t)}',
          ].join('');
          for (const file of walk(root).filter((item) => item.endsWith('.js'))) {
            const before = fs.readFileSync(file, 'utf8');
            let after = before;
            const routeStart = after.indexOf('function k0(e){');
            const routeEnd = routeStart === -1 ? -1 : after.indexOf('function em(){', routeStart);
            if (routeStart !== -1 && routeEnd !== -1) {
              after = `${after.slice(0, routeStart)}${routePatchReplacement}${after.slice(routeEnd)}`;
            }
            after = after.replace('const Lj=(function(){const t=typeof document<"u"&&document.createElement("link").relList;return t&&t.supports&&t.supports("modulepreload")?"modulepreload":"preload"})(),$j=function(e){return"/"+e}', `const Lj=(function(){const t=typeof document<"u"&&document.createElement("link").relList;return t&&t.supports&&t.supports("modulepreload")?"modulepreload":"preload"})(),$j=function(e){return${JSON.stringify(base + '/')}+e}`);
            if (after !== before) {
              fs.writeFileSync(file, after);
            }
          }

          const redirects = [
            ['en/zh-cn.html', `${base}/zh-cn/`],
            ['zh-cn/en.html', `${base}/en/`],
          ];
          for (const [fileName, target] of redirects) {
            const file = path.join(root, fileName);
            fs.mkdirSync(path.dirname(file), { recursive: true });
            fs.writeFileSync(
              file,
              `<!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta http-equiv="refresh" content="0; url=${target}">
              <title>Redirecting...</title>
              <script>location.replace(${JSON.stringify(target)});</script>
            </head>
            <body><a href="${target}">Redirecting...</a></body>
          </html>
          `,
            );
          }
          NODE
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
